<header class="site-header">
  <div class="header-inner">
    <a class="site-title" href="{{ "/" | relURL }}">{{ .Site.Title }}</a>
    <nav class="site-nav">
      {{ range .Site.Menus.main }}
      <a href="{{ .URL }}">{{ .Name }}</a>
      {{ end }}
    </nav>
    <button class="search-btn" aria-label="Search"><i class="fas fa-search"></i></button>
  </div>
</header>
